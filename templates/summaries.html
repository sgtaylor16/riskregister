<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Summaries</title>

</head>
<body>
    <h1>Risk Summaries</h1>
    <form id="summary-date-form">
        <label for="as-of-date">As of date:</label>
        <input type="date" id="as-of-date" name="date">
        <button type="submit">Apply</button>
    </form>
    <div id="pig">
        <svg width="100" height="500">
            <text x="30" y="250" text-anchor="middle" dominant-baseline="middle" transform="rotate(-90 30 250)" font-size="32">Impact</text>
        </svg>
    </div>
    <svg width="600" height="100">
        <text x="400" y="50" text-anchor="middle" dominant-baseline="middle" font-size="32">Probability</text>
    </svg>
    <script type="module">
        import { pigSummary } from '/static/graphics.js';

        const dateForm = document.getElementById('summary-date-form');
        const dateInput = document.getElementById('as-of-date');
        const pigContainer = document.getElementById('pig');

        function loadPigData(selectedDate = '') {
            let url = '/pigdata';
            if (selectedDate) {
                const params = new URLSearchParams({ date: selectedDate });
                url = `${url}?${params.toString()}`;
            }

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    // Clear the previous matrix before drawing the refreshed one.
                    pigContainer.querySelectorAll('svg:not(:first-child)').forEach(el => el.remove());
                    pigSummary(500, "#pig", data)
                });
        }

        dateForm.addEventListener('submit', (event) => {
            event.preventDefault();
            loadPigData(dateInput.value);
        });

        loadPigData();
    </script>
</body>
</html>
